on:
  workflow_dispatch:
  push:
    branches: main
  pull_request:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: 1.9.37
          tinytex: true
          
      - name: Setup Python with Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: quarto_template
          auto-activate-base: false 
      
      - name: Install Chrome Headless Shell
        shell: bash -el {0}
        run: quarto install chrome-headless-shell --no-prompt

      - name: Check Quarto and dependencies
        shell: bash -el {0}
        run: quarto check

      - name: Render and Publish 
        uses: quarto-dev/quarto-actions/publish@v2
        env:
          QUARTO_PUB_AUTH_TOKEN: ${{ secrets.QUARTO_PUB_AUTH_TOKEN }}
        with:
          target: quarto-pub

      - name: Save PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          path: _book/quarto_template_ugent.pdf
          retention-days: 90
          name: rendered_pdf_artifact